only_rules:
  - empty_count
  - force_cast
  - force_try
  - line_length
  - trailing_whitespace
  - unused_import
  - vertical_whitespace

included:
  - bridges/apple/SpeechAnalyzerCLI/Sources
  - bridges/apple/SpeechAnalyzerCLI/Tests
  - bridges/apple/FoundationModelsBridge/Sources
  - bridges/apple/FoundationModelsBridge/Tests

excluded:
  - bridges/apple/**/.build

allow_zero_lintable_files: false
strict: true
check_for_updates: false

line_length:
  warning: 120
  error: 140
