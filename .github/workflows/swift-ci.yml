name: Swift CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-tests:
    name: ${{ matrix.package_name }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: SpeechAnalyzerCLI
            package_path: swift/SpeechAnalyzerCLI
          - package_name: FoundationModelsBridge
            package_path: swift/FoundationModelsBridge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve package dependencies
        working-directory: ${{ matrix.package_path }}
        run: swift package resolve

      - name: Build package with warnings as errors
        working-directory: ${{ matrix.package_path }}
        run: swift build -Xswiftc -warnings-as-errors

      - name: Run Swift tests
        working-directory: ${{ matrix.package_path }}
        run: swift test
